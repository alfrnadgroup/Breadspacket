<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bread Packet | باقة الخبز</title>

<script src="https://www.paypal.com/sdk/js?client-id=AdAZZJ6hx9Dp_cz_e506XL770LMrBhzaepLYQhloCBMxn8JAN85AYlpBVLS-PwLnMcG5sFm2uCRgZrYH&currency=USD&intent=capture&components=buttons"></script>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif;}
body{background:#f4f1eb;color:#2d2418;}

.hero{
height:280px;
background:linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.4)),
url('https://images.unsplash.com/photo-1549931319-a545dcf3bc73');
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.hero h1{font-size:42px;}
.hero p{font-size:18px;margin-top:10px;}

.container{max-width:1200px;margin:auto;padding:20px;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
text-align:center;
transition:.3s;
}

.card:hover{transform:translateY(-5px);}

.price{font-size:22px;color:#3d6b3d;font-weight:bold;margin:10px 0;}

button{
background:#3d6b3d;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}

.cart{
margin-top:40px;
background:white;
padding:20px;
border-radius:15px;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:8px 0;
}

.total{
font-size:24px;
font-weight:bold;
margin-top:15px;
color:#3d6b3d;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
}

footer{
margin-top:40px;
padding:20px;
text-align:center;
background:#2d2418;
color:white;
}
</style>
</head>

<body>

<section class="hero">
<div>
<h1>Bread Packet | باقة الخبز</h1>
<p>خبز طازج يومياً بأنواع متنوعة</p>
</div>
</section>

<div class="container">

<h2>منتجاتنا</h2>

<div class="products">

<div class="card">
<h3>خبز لبناني</h3>
<div class="price">0.200 ر.ع</div>
<button onclick="addToCart('خبز لبناني',0.200)">أضف للسلة</button>
</div>

<div class="card">
<h3>خبز برجر</h3>
<div class="price">0.250 ر.ع</div>
<button onclick="addToCart('خبز برجر',0.250)">أضف للسلة</button>
</div>

<div class="card">
<h3>خبز سمون</h3>
<div class="price">0.200 ر.ع</div>
<button onclick="addToCart('خبز سمون',0.200)">أضف للسلة</button>
</div>

<div class="card">
<h3>بسكويت الشاي</h3>
<div class="price">0.300 ر.ع</div>
<button onclick="addToCart('بسكويت الشاي',0.300)">أضف للسلة</button>
</div>

<div class="card">
<h3>طلب خاص</h3>
<div class="price">حسب الطلب</div>
<button onclick="addToCart('طلب خاص',0)">أضف للسلة</button>
</div>

</div>

<div class="cart">

<h2>سلة المشتريات</h2>
<div id="cartItems"></div>

<div class="total">
الإجمالي: <span id="total">0.000</span> ر.ع
</div>

<input id="customerName" placeholder="الاسم الكامل">
<input id="phone" placeholder="رقم الهاتف">
<input id="address" placeholder="العنوان">

<label style="display:block;margin-top:10px;">
<input type="checkbox" id="phonePayment"> الدفع بواسطة الهاتف
</label>

<div id="paypal-button-container"></div>

<button onclick="sendPhoneOrder()" style="width:100%;margin-top:15px;">
إرسال الطلب
</button>

</div>
</div>

<footer>
<p>Bread Packet • Fresh Daily Bakery</p>
</footer>

<script>

let cart=[];

function addToCart(name,price){

let item=cart.find(x=>x.name===name);

if(item){
item.qty++;
}else{
cart.push({name,price,qty:1});
}

renderCart();
}

function renderCart(){

let html="";
let total=0;

cart.forEach(item=>{
let line=item.price*item.qty;
total+=line;

html+=`
<div class="cart-item">
<span>${item.name} × ${item.qty}</span>
<span>${line.toFixed(3)} ر.ع</span>
</div>
`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerHTML=total.toFixed(3);
}

function sendPhoneOrder(){

if(cart.length===0){
alert("السلة فارغة");
return;
}

if(!document.getElementById("phonePayment").checked){
alert("اختر الدفع بواسطة الهاتف");
return;
}

let orderData={
name:customerName.value,
phone:phone.value,
address:address.value,
items:cart.map(i=>`${i.name} x ${i.qty}`).join(", "),
total:total.innerText,
status:"Phone Payment"
};

fetch("/save-order",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(orderData)
})
.then(r=>r.json())
.then(()=>{
alert("تم إرسال الطلب");
cart=[];
renderCart();
})
.catch(()=>alert("خطأ في الإرسال"));
}

paypal.Buttons({

createOrder:function(){

if(cart.length===0){
alert("السلة فارغة");
return;
}

let orderData={
name:customerName.value,
phone:phone.value,
address:address.value,
items:cart.map(i=>`${i.name} x ${i.qty}`).join(", "),
total:total.innerText
};

return fetch("/create-payment",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(orderData)
})
.then(r=>r.json())
.then(d=>d.id);
},

onApprove:function(data){

return fetch("/capture-payment",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({orderID:data.orderID})
})
.then(r=>r.json())
.then(res=>{

if(res.paid){
alert("تم الدفع بنجاح");
cart=[];
renderCart();
}
else alert("فشل الدفع");

});
},

onError:function(){
alert("خطأ في الدفع");
}

}).render('#paypal-button-container');

</script>

</body>
</html>
